suite: Per-object state metrics ServiceMonitor
templates:
  - per-object-state-metrics-service-monitor.yaml
release:
  namespace: nico-system
tests:
  - it: is absent by default
    asserts:
      - hasDocuments:
          count: 0

  - it: is absent when enabled with empty objectTypes
    set:
      service:
        perObjectStateMetrics:
          enabled: true
          objectTypes: []
      perObjectStateMetricsServiceMonitor:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: uses the dedicated Service and slow scrape interval
    set:
      service:
        perObjectStateMetrics:
          enabled: true
          objectTypes:
            - machine
      perObjectStateMetricsServiceMonitor:
        enabled: true
        interval: 120s
        scrapeTimeout: 25s
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].interval
          value: 120s
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/metrics"]
          value: nico-api-object-metrics
